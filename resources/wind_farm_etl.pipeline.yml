# The main pipeline for wind_farm

resources:
  pipelines:
    wind_farm_etl:
      name: wind_farm_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/wind_farm_etl"

      libraries:
        - glob:
            include: ../src/wind_farm_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
