# This is a Databricks asset bundle definition for wind_farm.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: wind_farm
  uuid: cf8115ef-d227-4d4f-b837-a6cfe8ab7c38

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-66baf03b-132d.cloud.databricks.com
    variables:
      catalog: wind_farm_dev
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-66baf03b-132d.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/o.saywell@googlemail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/o.saywell@googlemail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: wind_farm_dev
      schema: prod
    permissions:
      - user_name: o.saywell@googlemail.com
        level: CAN_MANAGE
